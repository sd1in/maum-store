<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 QR카드 — 서울마음편의점 성동</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #3B5BDB;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* 입력 화면 */
  .input-wrap {
    background: white;
    border-radius: 24px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .input-wrap .logo { font-size: 28px; margin-bottom: 8px; }
  .input-wrap h2 { font-size: 18px; font-weight: 700; color: #1A1A2E; margin-bottom: 6px; }
  .input-wrap p { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
  .input-wrap input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #E0E4F0;
    border-radius: 12px;
    font-size: 16px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    margin-bottom: 14px;
    font-family: inherit;
  }
  .input-wrap input:focus { border-color: #3B5BDB; }
  .input-wrap button {
    width: 100%;
    padding: 14px;
    background: #3B5BDB;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .input-wrap button:hover { background: #2F4BC7; }

  /* QR 카드 */
  .qr-card {
    display: none;
    background: white;
    border-radius: 24px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .qr-card .badge {
    display: inline-block;
    background: #EEF2FF;
    color: #3B5BDB;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .qr-box {
    width: 200px;
    height: 200px;
    margin: 0 auto 20px;
    border-radius: 12px;
    overflow: hidden;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-box canvas, .qr-box img {
    width: 200px !important;
    height: 200px !important;
  }
  .user-name {
    font-size: 26px;
    font-weight: 900;
    color: #1A1A2E;
    margin-bottom: 6px;
  }
  .user-id {
    font-size: 14px;
    color: #6B7280;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }
  .guide {
    font-size: 12px;
    color: #9CA3AF;
    line-height: 1.8;
    border-top: 1px solid #F3F4F6;
    padding-top: 16px;
  }
  .reset-btn {
    margin-top: 16px;
    background: none;
    border: 1px solid #E0E4F0;
    color: #9CA3AF;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 입력 화면 -->
<div class="input-wrap" id="inputWrap">
  <div class="logo">🏪</div>
  <h2>서울마음편의점 성동</h2>
  <p>등록번호를 입력하면 QR카드가 생성됩니다</p>
  <input type="text" id="idInput" placeholder="SD2026-0000" maxlength="12">
  <input type="text" id="nameInput" placeholder="이름 (선택)" maxlength="10" style="margin-top:0;">
  <button onclick="showCard()">QR카드 생성</button>
</div>

<!-- QR 카드 -->
<div class="qr-card" id="qrCard">
  <div class="badge">🏪 서울마음편의점 성동</div>
  <div class="qr-box" id="qrcode"></div>
  <div class="user-name" id="cardName">이용자</div>
  <div class="user-id" id="cardId">SD2026-0000</div>
  <div class="guide">
    방문 시 이 QR코드를 담당자에게 보여주세요<br>
    식품은 주 1회 제공됩니다
  </div>
  <button class="reset-btn" onclick="reset()">다시 입력</button>
</div>

<script>
// URL 파라미터로 자동 표시
(function() {
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  var name = params.get('name');
  if (id) {
    document.getElementById('idInput').value = id;
    if (name) document.getElementById('nameInput').value = name;
    showCard();
  }
})();

function showCard() {
  var id = document.getElementById('idInput').value.trim().toUpperCase();
  var name = document.getElementById('nameInput').value.trim() || '이용자';

  if (!id) { alert('등록번호를 입력해주세요.'); return; }
  if (!/^SD\d{4}-\d{4}$/.test(id)) {
    alert('올바른 형식으로 입력해주세요.\n예) SD2026-1234');
    return;
  }

  document.getElementById('inputWrap').style.display = 'none';
  document.getElementById('qrCard').style.display = 'block';
  document.getElementById('cardName').textContent = name;
  document.getElementById('cardId').textContent = id;

  // QR 생성 - 등록번호|이름 형식
  document.getElementById('qrcode').innerHTML = '';
  setTimeout(function() {
    new QRCode(document.getElementById('qrcode'), {
      text: id + '|' + name,
      width: 200,
      height: 200,
      colorDark: '#1A1A2E',
      colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });
  }, 50);
}

function reset() {
  document.getElementById('qrCard').style.display = 'none';
  document.getElementById('inputWrap').style.display = 'block';
  document.getElementById('idInput').value = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('qrcode').innerHTML = '';
}

document.getElementById('idInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') document.getElementById('nameInput').focus();
});
document.getElementById('nameInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') showCard();
});
</script>
</body>
</html>
